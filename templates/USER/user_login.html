<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — STATXTRACT User Portal</title>
  <meta name="description" content="Sign in to the STATXTRACT user portal to access verified government data and analytics tools.">
  <link rel="stylesheet" href="/static/user_styles.css">
  <style>
    /* ── PAGE-SPECIFIC ── */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #F5F7FA 0%, #EEF3FB 55%, #E9EEF7 100%);
    }
    .page-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    .auth-container {
      width: 100%;
      max-width: 520px;
    }
    .brand-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      font-family: var(--font-head);
      font-size: 42px;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: -1px;
      display: block;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .brand-logo:hover { opacity: 0.85; }
    .brand-tagline {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .auth-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border: 2px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 44px 40px;
      box-shadow: var(--shadow-xl);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--saffron), var(--green));
      background-size: 200% 100%;
      animation: gradientShift 3s ease infinite;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .auth-card:hover {
      border-color: var(--green);
      box-shadow: 0 25px 70px rgba(46,125,50,0.18);
      transform: translateY(-2px);
    }
    .auth-title {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 6px;
    }
    .auth-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 30px;
    }
    .form-input-icon {
      position: relative;
    }
    .form-input-icon .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
    }
    .form-input-icon .form-input {
      padding-left: 44px;
    }
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 15px;
      padding: 2px;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--green); }
    .auth-btn {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: #fff;
      border: 2px solid var(--green);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .auth-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.4s;
    }
    .auth-btn:hover::before { left: 100%; }
    .auth-btn:hover {
      border-color: var(--saffron);
      box-shadow: 0 8px 30px rgba(46,125,50,0.5), 0 0 40px rgba(144,238,144,0.3);
      transform: translateY(-2px);
    }
    .auth-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .auth-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--green);
      font-weight: 700;
      cursor: pointer;
      transition: color 0.2s;
    }
    .auth-footer a:hover { color: var(--green-dark); }
    .error-message {
      background: #FFEBEE;
      border: 1px solid #FFCDD2;
      color: var(--danger);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .divider-or {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider-or::before, .divider-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }
    .divider-or span {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      opacity: 0.08;
      animation: floatParticle linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes floatParticle {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.08; }
      90%  { opacity: 0.08; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="animated-bg-blob" style="width:700px;height:700px;background:radial-gradient(circle,#2E7D32,transparent 70%);top:-200px;left:-200px;"></div>
    <div class="animated-bg-blob" style="width:500px;height:500px;background:radial-gradient(circle,#2E5BBA,transparent 70%);bottom:-100px;right:-100px;animation-delay:-10s;animation-duration:28s;"></div>
    <div class="animated-bg-blob" style="width:300px;height:300px;background:radial-gradient(circle,#F4A300,transparent 70%);top:40%;left:60%;opacity:0.04;animation-duration:22s;animation-delay:-5s;"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Page Wrapper -->
  <div class="page-wrapper">
    <div class="auth-container" style="position:relative;z-index:1;">
      <!-- Brand -->
      <div class="brand-header">
        <a href="/" class="brand-logo">STATXTRACT</a>
        <p class="brand-tagline">🇮🇳 Verified Government Data &amp; Analytics Platform</p>
      </div>

      <!-- Auth Card -->
      <div class="auth-card" id="authCard">
        <button class="btn-back" type="button" onclick="window.location.href='/user/module-selection'" style="margin-bottom: 12px; display: inline-flex; align-items: center; gap: 8px; background: none; border: none; font-size: 14px; color: var(--text-muted); cursor: pointer; font-family: var(--font-body); font-weight: 600; padding: 6px 0; transition: color 0.2s;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <h1 class="auth-title">Welcome back 👋</h1>
        <p class="auth-subtitle">Sign in to access your data portal and analytics dashboard.</p>

        <!-- Error Alert -->
        <div class="error-message hidden" id="errorMsg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          <span id="errorText">Invalid credentials. Please try again.</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="/auth/login">
          <!-- Email -->
          <div class="form-field">
            <label class="form-label" for="email">Email Address</label>
            <div class="form-input-icon">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,12 2,6"></polyline></svg>
              <input
                type="email"
                id="email"
                name="username"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              >
            </div>
          </div>

          <!-- Password -->
          <div class="form-field">
            <label class="form-label" for="password">Password</label>
            <div class="form-input-icon">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              >
              <button type="button" class="pw-toggle" id="togglePw" title="Show/Hide Password">
                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="auth-btn" id="submitBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
            <span>Sign In</span>
          </button>
        </form>

        <div class="divider-or"><span>or</span></div>

        <p class="auth-footer">
          Don't have an account?
          <a href="/user/register">Create Account</a>
        </p>
      </div>

      <!-- Security Note -->
      <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted);">
        🔒 Secured with JWT authentication · Data encrypted in transit
      </p>
    </div>
  </div>

  <script>
    // ── Password toggle ──
    const togglePw = document.getElementById('togglePw');
    const pwInput  = document.getElementById('password');
    togglePw.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      togglePw.innerHTML = isText
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    });

    // ── Form Submission ──
    const form      = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg  = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Validation
      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(email)) {
        showError('Please enter a valid email address.');
        return;
      }

      // UI Loading State
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span class="spinner"></span><span>Signing In...</span>`;
      errorMsg.classList.add('hidden');

      try {
        // Use FormData for x-www-form-urlencoded (required by OAuth2PasswordRequestForm)
        const formData = new URLSearchParams();
        formData.append('username', email);
        formData.append('password', password);

        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData,
          redirect: 'follow',
        });

        if (res.redirected) {
          // Store lightweight session data for UI use
          sessionStorage.setItem('userEmail', email);
          window.location.href = res.url;
          return;
        }

        if (res.ok) {
          const data = await res.json().catch(() => null);
          if (data && data.access_token) {
            // JWT token response — store and redirect
            document.cookie = `access_token=${data.access_token}; path=/; SameSite=Lax`;
            sessionStorage.setItem('userEmail', email);
            window.location.href = '/user/dashboard';
          } else {
            window.location.href = '/query';
          }
        } else if (res.status === 302) {
          window.location.href = res.headers.get('Location') || '/query';
        } else {
          const err = await res.json().catch(() => ({ detail: 'Sign-in failed. Check your credentials.' }));
          showError(err.detail || 'Invalid email or password.');
        }
      } catch (err) {
        // Network error — try standard form submit
        showError('Network error. Trying standard login...');
        setTimeout(() => form.submit(), 800);
      }

      submitBtn.disabled = false;
      submitBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg><span>Sign In</span>`;
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('hidden');
      errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Check for error param in URL ──
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'invalid') {
      showError('Invalid email or password. Please try again.');
    }

    // ── Shake animation on error ──
    function shakeCard() {
      const card = document.getElementById('authCard');
      card.style.animation = 'shakeX 0.4s ease';
      setTimeout(() => card.style.animation = '', 400);
    }
    const style = document.createElement('style');
    style.textContent = `@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`;
    document.head.appendChild(style);

    // ── Toast ──
    function showToast(msg, type = 'info') {
      const tc = document.getElementById('toastContainer');
      const t  = document.createElement('div');
      t.className = `toast ${type}`;
      const icons = {success:'✅', error:'❌', info:'ℹ️'};
      t.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
      tc.appendChild(t);
      setTimeout(() => { t.style.animation = 'slideOutRight 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 4000);
    }

    // ── If already logged in, try to redirect ──
    const token = document.cookie.split(';').find(c => c.trim().startsWith('access_token='));
    if (token) {
      // Already has token cookie, try to go to dashboard
      // window.location.href = '/query';
    }
  </script>
</body>
</html>
