        // ── Pagination Helpers ──
        function updatePaginationInfo(rowCount) {
            const limit = parseInt(document.getElementById('limit').value) || 50;
            const offset = parseInt(document.getElementById('offset').value) || 0;
            const currentPage = Math.floor(offset / limit) + 1;
            
            document.getElementById('currentPageNum').textContent = currentPage;
            document.getElementById('paginationRange').textContent = `${offset + 1} - ${offset + rowCount}`;
            document.getElementById('prevPageBtn').disabled = (offset <= 0);
            
            // Note: Total count not known exactly from query alone, but we can infer if we got full limit
            document.getElementById('nextPageBtn').disabled = (rowCount < limit);
            
            const pageSizeSelect = document.getElementById('pageSizeSelect');
            if (pageSizeSelect.value != limit) {
                // Adjust select if manual limit changed
                for(let i=0; i<pageSizeSelect.options.length; i++) {
                    if(pageSizeSelect.options[i].value == limit) {
                        pageSizeSelect.selectedIndex = i;
                        break;
                    }
                }
            }
        }

        function prevPage() {
            const limit = parseInt(document.getElementById('limit').value) || 50;
            let offset = parseInt(document.getElementById('offset').value) || 0;
            offset = Math.max(0, offset - limit);
            document.getElementById('offset').value = offset;
            runQuery();
        }

        function nextPage() {
            const limit = parseInt(document.getElementById('limit').value) || 50;
            let offset = parseInt(document.getElementById('offset').value) || 0;
            offset += limit;
            document.getElementById('offset').value = offset;
            runQuery();
        }

        function updatePageSize() {
            const limit = document.getElementById('pageSizeSelect').value;
            document.getElementById('limit').value = limit;
            document.getElementById('offset').value = 0; // Reset to page 1
            runQuery();
        }

        // Initialize Chart with Enhanced Options
        function initializeChartDefaults() {
            if (typeof ChartZoom !== 'undefined') {
                Chart.register(ChartZoom);
            }
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = '#111827';
        }

        // Global map to store category indices for chart axes
        let categoryMaps = {};
        let categoricalIndexCols = new Set();

        // Helper to handle categorical data on axes
        function isNumericValue(value) {
            if (value === null || value === "") return false;
            const num = Number(value);
            return !isNaN(num) && isFinite(num);
        }

        function parseChartValue(value, colName) {
             if (isNumericValue(value)) return Number(value);
             if (value === null || value === "") return 0;

             if (!categoryMaps[colName]) categoryMaps[colName] = [];
             let idx = categoryMaps[colName].indexOf(value);
             if (idx === -1) {
                 idx = categoryMaps[colName].length;
                 categoryMaps[colName].push(value);
             }
             categoricalIndexCols.add(colName);
             return idx; // Return 0-based index
        }

        // Update Chart with Animations
        function updateChart(dataRows = chartDataRows, showSuccessToast = true) {
            const chartWrapper = document.querySelector('.chart-canvas-wrapper');
            if (!Array.isArray(dataRows) || dataRows.length === 0) {
                if (currentChart) {
                    currentChart.destroy();
                    currentChart = null;
                }
                renderChartInfoState('fas fa-chart-bar', 'No data to visualize', 'Run query and click Generate Chart.');
                return;
            }

            const chartType = document.getElementById('chartType').value;
            const xAxisCol = document.getElementById('xAxis').value;
            const yAxisCol = document.getElementById('yAxis').value;

            // Reset category maps on new chart render
            categoryMaps = {};
            categoricalIndexCols = new Set();

            if (!xAxisCol || !yAxisCol) {
                if (currentChart) {
                    currentChart.destroy();
                    currentChart = null;
                }
                renderChartInfoState('fas fa-exclamation-triangle', 'Select axes', 'Please select both X and Y axis columns.');
                return;
            }

            chartWrapper.innerHTML = '<canvas id="myChart"></canvas>';
            if (currentChart) {
                currentChart.destroy();
            }

            const chartData = prepareChartData(dataRows, xAxisCol, yAxisCol, chartType);
            const ctx = document.getElementById('myChart');
            currentChart = new Chart(ctx, {
                type: chartType,
                data: chartData,
                options: getEnhancedChartOptions(chartType, xAxisCol, yAxisCol)
            });

            if (showSuccessToast) {
                showToast('Chart updated successfully!', 'success');
            }
        }

        // Enhanced Chart Options
        function getEnhancedChartOptions(chartType, xCol, yCol) {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const textColor = isDark ? '#ffffff' : '#000000';
            const axisTextColor = isDark ? 'rgba(255, 255, 255, 0.85)' : '#111827';
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(17, 24, 39, 0.12)';
            const tooltipBg = isDark ? 'rgba(0, 0, 0, 0.8)' : 'rgba(255, 255, 255, 0.96)';
            const tooltipText = isDark ? '#ffffff' : '#111827';
            const tooltipBorder = isDark ? 'rgba(102, 126, 234, 0.5)' : '#D1D5DB';

            const baseOptions = {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    intersect: false,
                    mode: 'index'
                },
                plugins: {
                    title: {
                        display: true,
                        text: `${yCol} by ${xCol}`,
                        font: {
                            size: 18,
                            weight: 'bold'
                        },
                        color: textColor
                    },
                    legend: {
                        labels: {
                            color: axisTextColor,
                            usePointStyle: true,
                            padding: 20
                        }
                    },
                    tooltip: {
                        backgroundColor: tooltipBg,
                        titleColor: tooltipText,
                        bodyColor: tooltipText,
                        borderColor: tooltipBorder,
                        borderWidth: 1,
                        cornerRadius: 10,
                        displayColors: true,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.y !== null) {
                                    if (categoricalIndexCols.has(yCol) && categoryMaps[yCol] && categoryMaps[yCol][context.parsed.y]) {
                                        label += categoryMaps[yCol][context.parsed.y];
                                    } else {
                                        label += context.parsed.y;
                                    }
                                }
                                return label;
                            }
                        }
                    }
                },
                animation: {
                    duration: 1000,
                    easing: 'easeOutQuart'
                }
            };

            if (chartType !== 'pie' && chartType !== 'doughnut') {
                baseOptions.scales = {
                    x: {
                        title: {
                            display: true,
                            text: xCol,
                            color: axisTextColor,
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        },
                        ticks: {
                            color: axisTextColor,
                            callback: function(value, index, values) {
                                if (categoryMaps[xCol] && categoryMaps[xCol][value]) {
                                    return categoryMaps[xCol][value];
                                }
                                return this.getLabelForValue(value);
                            }
                        },
                        grid: {
                            color: gridColor
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: yCol,
                            color: axisTextColor,
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        },
                        ticks: {
                            color: axisTextColor,
                            callback: function(value, index, values) {
                                if (categoricalIndexCols.has(yCol) && categoryMaps[yCol] && categoryMaps[yCol][value]) {
                                    return categoryMaps[yCol][value];
                                }
                                return value;
                            }
                        },
                        grid: {
                            color: gridColor
                        }
                    }
                };
            }

            return baseOptions;
        }

        // Prepare Chart Data with Purple Colors
        function prepareChartData(data, xCol, yCol, chartType) {
            if (chartType === 'pie' || chartType === 'doughnut') {
                const aggregated = {};
                const yIsNumeric = data.some(row => isNumericValue(row[yCol]));
                data.forEach(row => {
                    const key = row[xCol];
                    if (yIsNumeric) {
                        const value = Number(row[yCol]) || 0;
                        aggregated[key] = (aggregated[key] || 0) + value;
                    } else {
                        aggregated[key] = (aggregated[key] || 0) + 1;
                    }
                });

                return {
                    labels: Object.keys(aggregated),
                    datasets: [{
                        data: Object.values(aggregated),
                        backgroundColor: generatePurpleColors(Object.keys(aggregated).length),
                        borderWidth: 2,
                        borderColor: 'rgba(255, 255, 255, 0.3)'
                    }]
                };
            } else if (chartType === 'scatter') {
                return {
                    datasets: [{
                        label: `${yCol} vs ${xCol}`,
                        data: data.map(row => ({
                            x: parseChartValue(row[xCol], xCol),
                            y: parseChartValue(row[yCol], yCol)
                        })),
                        backgroundColor: 'rgba(102, 126, 234, 0.6)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }]
                };
            } else {
                const yIsNumeric = data.some(row => isNumericValue(row[yCol]));
                if (!yIsNumeric) {
                    const aggregated = {};
                    data.forEach(row => {
                        const key = row[xCol];
                        aggregated[key] = (aggregated[key] || 0) + 1;
                    });
                    const labels = Object.keys(aggregated);
                    const values = Object.values(aggregated);
                    return {
                        labels: labels,
                        datasets: [{
                            label: `Count`,
                            data: values,
                            backgroundColor: chartType === 'line' ? 'rgba(102, 126, 234, 0.2)' : 'rgba(102, 126, 234, 0.7)',
                            borderColor: 'rgba(102, 126, 234, 1)',
                            borderWidth: 3,
                            fill: chartType === 'line',
                            tension: chartType === 'line' ? 0.4 : 0,
                            pointBackgroundColor: 'rgba(118, 75, 162, 1)',
                            pointBorderColor: 'white',
                            pointBorderWidth: 2,
                            pointRadius: chartType === 'line' ? 5 : 0,
                            pointHoverRadius: 8
                        }]
                    };
                }

                const labels = data.map(row => row[xCol]);
                const values = data.map(row => Number(row[yCol]) || 0);

                return {
                    labels: labels,
                    datasets: [{
                        label: yCol,
                        data: values,
                        backgroundColor: chartType === 'line' ? 'rgba(102, 126, 234, 0.2)' : 'rgba(102, 126, 234, 0.7)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 3,
                        fill: chartType === 'line',
                        tension: chartType === 'line' ? 0.4 : 0,
                        pointBackgroundColor: 'rgba(118, 75, 162, 1)',
                        pointBorderColor: 'white',
                        pointBorderWidth: 2,
                        pointRadius: chartType === 'line' ? 5 : 0,
                        pointHoverRadius: 8
                    }]
                };
            }
        }

        // Generate Purple Colors
        function generatePurpleColors(count) {
            const baseColors = [
                'rgba(102, 126, 234, 0.8)',
                'rgba(118, 75, 162, 0.8)',
                'rgba(240, 147, 251, 0.8)',
                'rgba(245, 87, 108, 0.8)',
                'rgba(79, 172, 254, 0.8)',
                'rgba(255, 217, 61, 0.8)',
                'rgba(255, 107, 107, 0.8)',
                'rgba(67, 233, 123, 0.8)'
            ];

            const result = [];
            for (let i = 0; i < count; i++) {
                result.push(baseColors[i % baseColors.length]);
            }
            return result;
        }

        // Chart Download Functions
        function downloadChartPNG() {
            if (!currentChart) {
                showToast("No chart to download. Please create a chart first.", 'error');
                return;
            }

            const link = document.createElement('a');
            link.download = `chart_${getCurrentTimestamp()}.png`;
            link.href = currentChart.toBase64Image('image/png', 1);
            link.click();
            showToast('Chart downloaded as PNG!', 'success');
        }

        function downloadChartJPEG() {
            if (!currentChart) {
                showToast("No chart to download. Please create a chart first.", 'error');
                return;
            }

            const link = document.createElement('a');
            link.download = `chart_${getCurrentTimestamp()}.jpg`;
            link.href = currentChart.toBase64Image('image/jpeg', 0.9);
            link.click();
            showToast('Chart downloaded as JPEG!', 'success');
        }

        function downloadChartSVG() {
            if (!currentChart) {
                showToast("No chart to download. Please create a chart first.", 'error');
                return;
            }

            const canvas = document.getElementById('myChart');
            const svgString = canvasToSVG(canvas);
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const link = document.createElement('a');
            link.download = `chart_${getCurrentTimestamp()}.svg`;
            link.href = URL.createObjectURL(blob);
            link.click();
            showToast('Chart downloaded as SVG!', 'success');
        }

        function downloadChartPDF() {
            if (!currentChart) {
                showToast("No chart to download. Please create a chart first.", 'error');
                return;
            }

            try {
                const { jsPDF } = window.jspdf;

                if (!jsPDF) {
                    showToast("PDF library not loaded. Please refresh the page and try again.", 'error');
                    return;
                }

                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'mm',
                    format: 'a4'
                });

                const chartType = document.getElementById('chartType').value;
                const xAxisCol = document.getElementById('xAxis').value;
                const yAxisCol = document.getElementById('yAxis').value;
                const survey = document.getElementById('survey').value;
                const dataset = document.getElementById('dataset').value;
                const table = document.getElementById('table').value;

                pdf.setFontSize(16);
                pdf.text(`Chart Report: ${yAxisCol} by ${xAxisCol}`, 20, 20);

                pdf.setFontSize(10);
                pdf.text(`Chart Type: ${chartType.toUpperCase()}`, 20, 30);
                pdf.text(`Data Source: ${survey}/${dataset}.${table}`, 20, 35);
                pdf.text(`Generated: ${new Date().toLocaleString()}`, 20, 40);
                pdf.text(`Records: ${latestResults.length}`, 20, 45);

                const canvas = document.getElementById('myChart');
                const canvasImg = canvas.toDataURL('image/png', 1.0);
                const imgWidth = 250;
                const imgHeight = 150;

                pdf.addImage(canvasImg, 'PNG', 20, 55, imgWidth, imgHeight);

                if (latestResults.length > 0) {
                    let yPos = 220;

                    pdf.setFontSize(12);
                    pdf.text("Data Summary:", 20, yPos);
                    yPos += 10;

                    pdf.setFontSize(8);
                    const sampleData = latestResults.slice(0, 5);
                    const columns = Object.keys(sampleData[0]);

                    let xPos = 20;
                    columns.forEach(col => {
                        pdf.text(col, xPos, yPos);
                        xPos += 40;
                    });
                    yPos += 5;

                    sampleData.forEach(row => {
                        xPos = 20;
                        columns.forEach(col => {
                            const value = String(row[col] || '').substring(0, 15);
                            pdf.text(value, xPos, yPos);
                            xPos += 40;
                        });
                        yPos += 5;
                    });

                    if (latestResults.length > 5) {
                        pdf.text(`... and ${latestResults.length - 5} more rows`, 20, yPos + 5);
                    }
                }

                pdf.save(`chart_report_${getCurrentTimestamp()}.pdf`);
                showToast('Chart report downloaded as PDF!', 'success');

            } catch (error) {
                console.error('PDF generation error:', error);
                showToast('Error generating PDF. Please try again or use PNG download instead.', 'error');
            }
        }

        // Utility Functions
        function canvasToSVG(canvas) {
            const width = canvas.width;
            const height = canvas.height;
            const dataURL = canvas.toDataURL();

            return `<?xml version="1.0" encoding="UTF-8"?>
                    <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" 
                         width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
                        <title>Chart Export</title>
                        <image x="0" y="0" width="${width}" height="${height}" xlink:href="${dataURL}"/>
                    </svg>`;
        }

        function getCurrentTimestamp() {
            return new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
        }

        function downloadCSV() {
            if (latestResults.length === 0) {
                showToast("No results to download.", 'error');
                return;
            }

            const columns = Object.keys(latestResults[0]);
            let csv = columns.join(",") + "\n";
            latestResults.forEach(row => {
                csv += columns.map(col => JSON.stringify(row[col] ?? "")).join(",") + "\n";
            });
            const blob = new Blob([csv], { type: "text/csv" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `query_results_${getCurrentTimestamp()}.csv`;
            a.click();
            showToast('Data exported as CSV!', 'success');
        }

        function downloadJSON() {
            if (latestResults.length === 0) {
                showToast("No results to download.", 'error');
                return;
            }

            const blob = new Blob([JSON.stringify(latestResults, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `query_results_${getCurrentTimestamp()}.json`;
            a.click();
            showToast('Data exported as JSON!', 'success');
        }

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey || e.metaKey) {
                switch (e.key) {
                    case 'Enter':
                        e.preventDefault();
                        runQuery();
                        break;
                    case 's':
                        e.preventDefault();
                        downloadCSV();
                        break;
                    case 'd':
                        e.preventDefault();
                        toggleTheme();
                        break;
                }
            }
        });

        // Auto-save preferences
        window.addEventListener('beforeunload', function () {
            localStorage.setItem('analytics_theme', isDarkTheme);
            localStorage.setItem('analytics_view', currentView);
        });

        // Load preferences
        window.addEventListener('load', function () {
            const savedTheme = localStorage.getItem('analytics_theme');
            const savedView = localStorage.getItem('analytics_view');

            if (savedTheme === 'true') {
                toggleTheme();
            }

            if (savedView) {
                switchView(savedView);
            }
        });

        // User Logout Functionality
        async function handleLogout() {
            try {
                // Show logout loading state
                const logoutBtn = document.querySelector('.logout-btn');
                const originalContent = logoutBtn.innerHTML;

                // Update button to show loading
                logoutBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Logging out...</span>';
                logoutBtn.style.pointerEvents = 'none'; // Disable clicking

                // Show toast notification (if you have toast function)
                if (typeof showToast === 'function') {
                    showToast('Signing out...', 'info');
                } else {
                    console.log('Signing out...');
                }

                // Call logout endpoint
                const response = await fetch('/auth/logout', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    // Show success message
                    if (typeof showToast === 'function') {
                        showToast('Logged out successfully!', 'success');
                    } else {
                        alert('Logged out successfully!');
                    }

                    // Clear any local storage (keep theme preference)
                    const theme = localStorage.getItem('theme');
                    localStorage.clear();
                    if (theme) localStorage.setItem('theme', theme);

                    // Redirect to login page after a short delay
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    throw new Error('Logout request failed');
                }
            } catch (error) {
                console.error('Logout error:', error);

                // Show error message
                if (typeof showToast === 'function') {
                    showToast('Logout failed. Please try again.', 'error');
                } else {
                    alert('Logout failed. Please try again.');
                }

                // Restore button state on error
                const logoutBtn = document.querySelector('.logout-btn');
                logoutBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i><span>Logout</span>';
                logoutBtn.style.pointerEvents = 'auto';
            }
        }

        // Alternative: Force logout if API fails
        async function forceLogout() {
            try {
                if (typeof showToast === 'function') {
                    showToast('Forcing logout...', 'warning');
                }

                // Clear all cookies
                document.cookie.split(";").forEach(function (c) {
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
                });

                // Clear local storage (except theme)
                const theme = localStorage.getItem('theme');
                localStorage.clear();
                if (theme) localStorage.setItem('theme', theme);

                // Redirect to login
                window.location.href = '/login';
            } catch (error) {
                console.error('Force logout error:', error);
                window.location.href = '/login';
            }
        }

        // Handle session expiry
        window.addEventListener('unhandledrejection', function (event) {
            if (event.reason && event.reason.status === 401) {
                if (typeof showToast === 'function') {
                    showToast('Session expired. Please login again.', 'warning');
                } else {
                    alert('Session expired. Please login again.');
                }
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            }
        });
    </script>
</body>
