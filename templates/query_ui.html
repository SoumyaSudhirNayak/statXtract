<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Data Analytics Platform - Query</title>

    <!-- CDN Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            /* Standard Theme Tokens */
            --primary-color: #2E5BBA;
            --primary-gradient: linear-gradient(135deg, #2E5BBA 0%, #1F3A5F 100%);
            --secondary-color: #F4A300;
            --secondary-gradient: linear-gradient(135deg, #F4A300 0%, #D97706 100%);
            --success-color: #2E7D32;
            --warning-color: #F4A300;
            --danger-color: #D4183D;
            --primary-color: #2e5bba;
            --primary-gradient: linear-gradient(135deg, #2e5bba 0%, #1e3c72 100%);
            --secondary-color: #64748b;
            --success-color: #10b981;
            --danger-color: #d4183d;
            --warning-color: #f59e0b;
            
            --bg-color: #f8fafc;
            /* Main changes for Pure White */
            --glass-bg: #ffffff;
            --surface-bg: #ffffff;
            --surface-muted: #f1f5f9; /* Solid background for inputs/columns grid */
            --glass-border: rgba(226, 232, 240, 0.8);
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-on-primary: #ffffff;
            
            --shadow-light: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-heavy: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

            --border-radius: 16px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            
            --font-head: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --primary-color: #6366F1;
            --primary-gradient: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            --text-main: #F8FAFC;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg-page: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
            --surface-bg: #0F172A;
            --surface-muted: #1E293B;
            --glass-bg: #0F172A;
            --glass-border: rgba(100, 116, 139, 0.25);
            --shadow-light: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text-main);
            transition: var(--transition);
            overflow-x: hidden;
            padding: 0;
            margin: 0;
        }

        /* Standard Controls */
        .logout-btn,
        .theme-toggle {
            position: fixed;
            top: 20px;
            z-index: 1100;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            font-weight: 600;
            box-shadow: var(--shadow-light);
            text-decoration: none;
        }

        .logout-btn { left: 20px; }
        .theme-toggle { right: 20px; }

        .logout-btn:hover,
        .theme-toggle:hover {
            transform: translateY(-2px);
            background: var(--primary-color);
            color: var(--text-on-primary);
            box-shadow: var(--shadow-heavy);
        }

        .app-nav {
            position: fixed;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 24px;
            box-shadow: var(--shadow-light);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .crumb-icon {
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .crumb {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .crumb-active {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .chev {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .page-shell {
            max-width: 100%;
            margin: 0;
            padding: 0;
            animation: fadeIn 0.8s ease-out;
        }

        .query-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 0;
            align-items: start;
            min-height: 100vh;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-light);
            padding: 24px;
        }

        .form-panel {
            position: sticky;
            top: 0;
            left: 0;
            height: 100vh;
            max-height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            border-top: none;
            border-left: none;
            border-bottom: none;
            padding: 30px 24px;
        }

        .config-header {
            padding: 0 0 20px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .config-header h2 {
            font-family: var(--font-head);
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary-color);
            margin: 0;
        }

        .form-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-select, .form-input, textarea.form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface-muted);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-select:focus, .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(46, 91, 186, 0.1);
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: var(--text-on-primary);
        }

        .btn-secondary {
            background: var(--surface-muted);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .btn-success { background: var(--success-color); color: var(--text-on-primary); }
        .btn-warning { background: var(--warning-color); color: var(--text-on-primary); }
        .btn-danger { background: var(--danger-color); color: var(--text-on-primary); }

        .btn-sm { padding: 8px 16px; font-size: 0.85rem; }

        .columns-grid {
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--surface-muted);
            max-height: 200px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .column-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            padding: 4px 0;
            color: var(--text-main);
        }

        .column-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .results-container, .table-results-container, .chart-results-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-light);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .results-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .results-header h3 {
            font-family: var(--font-head);
            font-weight: 700;
            color: var(--text-main);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: var(--surface-muted);
            padding: 14px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }

        .data-table td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .data-table tr:hover { background: rgba(46, 91, 186, 0.03); }

        .chart-canvas-wrapper {
            padding: 24px;
            background: var(--surface-bg);
            min-height: 400px;
            border-radius: 12px;
        }

        .filter-mode-toggle {
            display: flex;
            background: var(--surface-muted);
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }

        .mode-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .mode-btn.active {
            background: var(--primary-gradient);
            color: var(--text-on-primary);
        }

        .filter-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--surface-muted);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease-out;
        }

        .filter-main-controls {
            display: grid;
            grid-template-columns: 1fr 100px 32px;
            gap: 8px;
            align-items: center;
        }

        .filter-value-container {
            width: 100%;
        }

        /* Categorical Grid */
        .cat-select-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 150px;
            overflow-y: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 8px;
        }

        .cat-option {
            padding: 5px 12px;
            background: var(--surface-muted);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .cat-option:hover {
            border-color: var(--primary-color);
            background: rgba(46, 91, 186, 0.05);
        }

        .cat-option.selected {
            background: var(--primary-gradient);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(46, 91, 186, 0.2);
        }

        .range-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .range-sep {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .filter-remove-btn {
            background: rgba(212, 24, 61, 0.1);
            color: var(--danger-color);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: var(--transition);
        }

        .filter-remove-btn:hover { background: var(--danger-color); color: white; }

        /* Loader */
        .loading-spinner {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .loading-spinner.active {
            display: flex;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--surface-muted);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: var(--shadow-heavy);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            font-weight: 600;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Button hover lift */
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
            filter: brightness(1.08);
        }

        /* Limit / Offset grid */
        .limit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Action row (Execute + export) */
        .action-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .execute-btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--surface-muted);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-gradient);
            border-radius: 10px;
            transition: width 0.35s ease;
        }

        /* Results wrap */
        .results-wrap {
            min-width: 0; /* Fixes horizontal scroll blowout in grid */
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 24px;
            margin-top: 20px;
        }

        /* Table container */
        .table-container {
            max-height: 600px;
            overflow-y: auto;
            overflow-x: auto;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .table-view-shell {
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* Pagination  */
        .pagination-controls {
            display: flex;
            padding: 12px 24px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--surface-muted);
            align-items: center;
        }

        .pagination-controls span {
            color: var(--text-main);
        }

        /* Chart controls area */
        .chart-controls {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            padding: 16px 24px;
            border-bottom: 1px solid var(--glass-border);
            background: var(--surface-muted);
        }

        .chart-control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chart-control-group label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .chart-control-group select {
            min-width: 130px;
            padding: 10px 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .chart-control-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(46, 91, 186, 0.1);
        }

        /* Chart container */
        .chart-container {
            padding: 24px;
        }

        /* FAB (scroll to top) */
        .fab {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: var(--text-on-primary);
            font-size: 1rem;
            box-shadow: var(--shadow-heavy);
            cursor: pointer;
            z-index: 900;
            transition: var(--transition);
            display: grid;
            place-items: center;
        }

        .fab:hover {
            transform: translateY(-3px) scale(1.05);
        }

        /* Empty result banner */
        .empty-result-banner {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-muted);
        }

        .empty-result-banner i {
            display: block;
            margin-bottom: 16px;
            color: var(--primary-color);
            font-size: 3rem;
            opacity: 0.7;
        }

        .empty-result-banner p {
            font-family: var(--font-head);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .empty-result-banner small {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Filter chips */
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            border: 1px solid var(--primary-color);
            background: rgba(46, 91, 186, 0.08);
            color: var(--primary-color);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 14px;
        }

        .chip-remove {
            width: 18px;
            height: 18px;
            border: 0;
            border-radius: 999px;
            display: grid;
            place-items: center;
            cursor: pointer;
            background: rgba(212, 24, 61, 0.1);
            color: var(--danger-color);
            font-size: 0.6rem;
            transition: var(--transition);
        }

        .chip-remove:hover {
            background: var(--danger-color);
            color: white;
        }

        /* Category select grid */
        .cat-select-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 130px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .cat-option {
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            background: var(--glass-bg);
            color: var(--text-main);
            transition: var(--transition);
        }

        .cat-option:hover {
            border-color: var(--primary-color);
        }

        .cat-option.selected {
            border-color: var(--primary-color);
            background: rgba(46, 91, 186, 0.1);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Range inputs */
        .range-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-sep {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .slider-wrapper {
            position: relative;
            padding-top: 14px;
        }

        .slider-wrapper input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--glass-border);
            border-radius: 999px;
            position: absolute;
            pointer-events: none;
        }

        .slider-wrapper input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            pointer-events: auto;
            width: 16px;
            height: 16px;
            border-radius: 999px;
            background: var(--primary-color);
            cursor: pointer;
        }

        .slider-labels {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Smart filter sections */
        #smartFilterSection {
            max-height: 300px;
            overflow: hidden;
        }

        #filterRows {
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* View toggle (table/chart switch) */
        .view-toggle {
            display: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(107, 114, 128, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(107, 114, 128, 0.4); }

        @media (max-width: 1100px) {
            .query-layout { grid-template-columns: 1fr; }
            .form-panel { position: static; max-height: none; }
        }

        @media (max-width: 768px) {
            .chart-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .results-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .logout-btn, .theme-toggle {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .app-nav {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <header>
        <nav class="app-nav">
            <div class="crumb-icon"><i class="fas fa-chart-pie"></i></div>

    <script>
        // Global Variables
        let tableDataBySchema = {};
        let latestResults = [];
        let currentChart = null;
        let chartDataRows = [];
        let chartRequestCache = { key: '', rows: [] };
        let chartNeedsRefresh = true;
        let isGeneratingChart = false;
        let hasQueryRun = false;
        let currentView = 'both';
        let isDarkTheme = false;
        let filterMode = 'smart';  // 'smart' or 'manual'

        // Theme Setup
        function toggleTheme() {
            const body = document.documentElement;
            isDarkTheme = body.getAttribute('data-theme') !== 'dark';
            if (isDarkTheme) {
                body.setAttribute('data-theme', 'dark');
                document.querySelector('.theme-toggle span').textContent = 'Light Mode';
                document.querySelector('.theme-toggle i').className = 'fas fa-sun';
            } else {
                body.removeAttribute('data-theme');
                document.querySelector('.theme-toggle span').textContent = 'Dark Mode';
                document.querySelector('.theme-toggle i').className = 'fas fa-moon';
            }
            localStorage.setItem('theme', isDarkTheme ? 'dark' : 'light');

            // Update Chart.js default colors and re-render if chart exists
            Chart.defaults.color = isDarkTheme ? '#F8FAFC' : '#111827';
            if (currentChart && chartDataRows.length > 0 && !isGeneratingChart) {
                updateChart(chartDataRows, false); // re-render silently
            }
        }

        // ── Filter Builder State ──
        let filterMetadata = [];   // per-column metadata from /filter-metadata
        let filterRowId = 0;       // unique ID counter for filter rows
        let activeFilters = [];    // [{id, column, operator, value, displayLabel}]

        // ── Filter Mode Toggle ──
        function setFilterMode(mode) {
            filterMode = mode;
            document.querySelectorAll('.filter-mode-toggle .mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            const smartSection = document.getElementById('smartFilterSection');
            const manualSection = document.getElementById('manualFilterSection');
            const logicSelect = document.getElementById('filterLogic');
            if (mode === 'smart') {
                smartSection.style.display = '';
                manualSection.style.display = 'none';
                logicSelect.style.display = '';
            } else {
                smartSection.style.display = 'none';
                manualSection.style.display = '';
                logicSelect.style.display = 'none';
            }
        }

        // ── Manual filter SQL-safety validator ──
        const BLOCKED_SQL_KEYWORDS = /\b(DROP|DELETE|INSERT|UPDATE|ALTER|TRUNCATE|CREATE|EXEC|EXECUTE|GRANT|REVOKE|UNION|INTO|SET)\b/i;
        function validateManualFilter(text) {
            if (!text || !text.trim()) return { valid: true, sanitized: '' };
            if (BLOCKED_SQL_KEYWORDS.test(text)) {
                return { valid: false, error: 'Blocked keyword detected. Only SELECT-style filter expressions are allowed (=, !=, >, <, BETWEEN, IN, LIKE).' };
            }
            // Block semicolons, comments
            if (/[;]|--|\/\*/.test(text)) {
                return { valid: false, error: 'Semicolons and SQL comments are not allowed.' };
            }
            return { valid: true, sanitized: text.trim() };
        }

        // Load filter metadata for the selected table
        async function loadFilterMetadata(survey, dataset, tableName) {
            try {
                const res = await fetch(`/surveys/${survey}/${encodeURIComponent(dataset)}/${tableName}/filter-metadata`);
                if (res.ok) {
                    filterMetadata = await res.json();
                } else {
                    filterMetadata = [];
                }
            } catch (e) {
                console.warn('Filter metadata not available:', e);
                filterMetadata = [];
            }
            // Reset filter state
            activeFilters = [];
            filterRowId = 0;
            document.getElementById('filterRows').innerHTML = '';
            renderFilterChips();
            document.getElementById('clearFiltersBtn').style.display = 'none';
        }

        // Get column metadata by name
        function getColumnMeta(colName) {
            return filterMetadata.find(m => m.column_name === colName) || null;
        }

        // Operators per type
        function getOperators(filterType) {
            switch (filterType) {
                case 'numeric':  return ['=', '!=', '>', '<', '>=', '<=', 'BETWEEN'];
                case 'categorical': return ['=', 'IN'];
                case 'text':     return ['=', '!=', 'LIKE'];
                default:         return ['=', '!=', '>', '<', 'LIKE'];
            }
        }

        // Add a new filter row
        function addFilterRow() {
            if (filterMetadata.length === 0) {
                showToast('Select a table first to enable filters', 'warning');
                return;
            }

            const rowId = filterRowId++;
            const container = document.getElementById('filterRows');
            const row = document.createElement('div');
            row.className = 'filter-row';
            row.id = `filter-row-${rowId}`;
            row.dataset.rowId = rowId;

            // Column select
            let colOptions = '<option value="" disabled selected>Column...</option>';
            filterMetadata.forEach(m => {
                const lbl = m.label !== m.column_name ? `${m.label} (${m.column_name})` : m.column_name;
                colOptions += `<option value="${m.column_name}">${lbl}</option>`;
            });

            row.innerHTML = `
                <div class="filter-main-controls">
                    <select class="form-select filter-col" style="padding: 8px 12px; height: 38px;" onchange="onFilterColumnChange(${rowId})">${colOptions}</select>
                    <select class="form-select filter-op" style="padding: 8px 12px; height: 38px;"><option value="" disabled selected>Op</option></select>
                    <button class="filter-remove-btn" onclick="removeFilterRow(${rowId})" title="Remove filter"><i class="fas fa-times"></i></button>
                </div>
                <div class="filter-value-container">
                    <input class="form-input filter-val" style="padding: 8px 12px;" placeholder="Choose column..." disabled>
                </div>
            `;
            container.appendChild(row);
            document.getElementById('clearFiltersBtn').style.display = 'inline-flex';
        }

        // When column is selected, update operator dropdown and value input
        function onFilterColumnChange(rowId) {
            const row = document.getElementById(`filter-row-${rowId}`);
            if (!row) return;
            const colSelect = row.querySelector('.filter-col');
            const opSelect = row.querySelector('.filter-op');
            const valContainer = row.querySelector('.filter-value-container');
            const colName = colSelect.value;
            const meta = getColumnMeta(colName);
            if (!meta) return;

            // Populate operator dropdown
            const ops = getOperators(meta.filter_type);
            opSelect.innerHTML = ops.map((op, i) => `<option value="${op}" ${i === 0 ? 'selected' : ''}>${op}</option>`).join('');
            opSelect.onchange = () => onFilterOperatorChange(rowId);

            // Build value input
            buildValueInput(rowId, meta, ops[0]);
        }

        // When operator changes, rebuild value input
        function onFilterOperatorChange(rowId) {
            const row = document.getElementById(`filter-row-${rowId}`);
            if (!row) return;
            const colName = row.querySelector('.filter-col').value;
            const op = row.querySelector('.filter-op').value;
            const meta = getColumnMeta(colName);
            if (!meta) return;
            buildValueInput(rowId, meta, op);
        }

        // Build the value input based on column type and operator
        function buildValueInput(rowId, meta, operator) {
            const row = document.getElementById(`filter-row-${rowId}`);
            const valContainer = row.querySelector('.filter-value-container');

            if (operator === 'BETWEEN' && meta.filter_type === 'numeric') {
                // Range inputs with optional slider
                const stats = meta.statistics || {};
                const minVal = stats.min != null ? parseFloat(stats.min) : '';
                const maxVal = stats.max != null ? parseFloat(stats.max) : '';
                let html = `<div class="range-input-group">
                    <input class="form-input filter-val-min" type="number" placeholder="Min${minVal !== '' ? ' (' + minVal + ')' : ''}" value="${minVal !== '' ? minVal : ''}" step="any">
                    <span class="range-sep">to</span>
                    <input class="form-input filter-val-max" type="number" placeholder="Max${maxVal !== '' ? ' (' + maxVal + ')' : ''}" value="${maxVal !== '' ? maxVal : ''}" step="any">
                </div>`;
                if (minVal !== '' && maxVal !== '') {
                    html += `<div class="slider-wrapper">
                        <input type="range" class="slider-min" min="${minVal}" max="${maxVal}" value="${minVal}" step="${(maxVal - minVal) > 100 ? 1 : 0.1}">
                        <input type="range" class="slider-max" min="${minVal}" max="${maxVal}" value="${maxVal}" step="${(maxVal - minVal) > 100 ? 1 : 0.1}">
                        <div class="slider-labels"><span>${minVal}</span><span>${maxVal}</span></div>
                    </div>`;
                }
                valContainer.innerHTML = html;

                // Bind slider ↔ input sync
                const sliderMin = valContainer.querySelector('.slider-min');
                const sliderMax = valContainer.querySelector('.slider-max');
                const inputMin = valContainer.querySelector('.filter-val-min');
                const inputMax = valContainer.querySelector('.filter-val-max');
                if (sliderMin && sliderMax) {
                    sliderMin.addEventListener('input', () => { inputMin.value = sliderMin.value; updateFilterFromRow(rowId); });
                    sliderMax.addEventListener('input', () => { inputMax.value = sliderMax.value; updateFilterFromRow(rowId); });
                    inputMin.addEventListener('change', () => { sliderMin.value = inputMin.value; updateFilterFromRow(rowId); });
                    inputMax.addEventListener('change', () => { sliderMax.value = inputMax.value; updateFilterFromRow(rowId); });
                }
                inputMin.addEventListener('change', () => updateFilterFromRow(rowId));
                inputMax.addEventListener('change', () => updateFilterFromRow(rowId));

            } else if (meta.filter_type === 'categorical' && meta.categories && (operator === '=' || operator === 'IN')) {
                // Clickable category tags
                const isMulti = operator === 'IN';
                let html = `<div class="cat-select-grid" data-multi="${isMulti}">`;
                meta.categories.forEach(cat => {
                    const displayLabel = cat.label && cat.label !== cat.value ? `${cat.label} (${cat.value})` : cat.value;
                    html += `<div class="cat-option" data-value="${cat.value}" onclick="toggleCatOption(this,${rowId})">${displayLabel}</div>`;
                });
                html += '</div>';
                valContainer.innerHTML = html;

            } else if (meta.filter_type === 'numeric') {
                // Simple numeric input
                const stats = meta.statistics || {};
                const ph = stats.min != null ? `Range: ${stats.min} – ${stats.max}` : 'Enter value...';
                valContainer.innerHTML = `<input class="form-input filter-val" type="number" placeholder="${ph}" step="any">`;
                valContainer.querySelector('.filter-val').addEventListener('change', () => updateFilterFromRow(rowId));

            } else {
                // Text input
                valContainer.innerHTML = `<input class="form-input filter-val" type="text" placeholder="Enter value...">`;
                valContainer.querySelector('.filter-val').addEventListener('change', () => updateFilterFromRow(rowId));
            }
        }

        // Toggle categorical option selection
        function toggleCatOption(el, rowId) {
            const grid = el.parentElement;
            const isMulti = grid.dataset.multi === 'true';
            if (!isMulti) {
                grid.querySelectorAll('.cat-option').forEach(o => o.classList.remove('selected'));
            }
            el.classList.toggle('selected');
            updateFilterFromRow(rowId);
        }

        // Read current value from a filter row
        function readFilterRowValue(rowId) {
            const row = document.getElementById(`filter-row-${rowId}`);
            if (!row) return null;
            const col = row.querySelector('.filter-col').value;
            const op = row.querySelector('.filter-op').value;
            if (!col || !op) return null;
            const meta = getColumnMeta(col);
            const valContainer = row.querySelector('.filter-value-container');

            // BETWEEN
            const minInput = valContainer.querySelector('.filter-val-min');
            const maxInput = valContainer.querySelector('.filter-val-max');
            if (minInput && maxInput) {
                const minV = minInput.value.trim();
                const maxV = maxInput.value.trim();
                if (!minV && !maxV) return null;
                return { column: col, operator: 'BETWEEN', value: [minV || '0', maxV || '999999'], label: meta?.label || col };
            }

            // Categorical grid
            const catGrid = valContainer.querySelector('.cat-select-grid');
            if (catGrid) {
                const selected = Array.from(catGrid.querySelectorAll('.cat-option.selected')).map(o => o.dataset.value);
                if (selected.length === 0) return null;
                return { column: col, operator: op, value: selected, label: meta?.label || col };
            }

            // Simple input
            const simpleInput = valContainer.querySelector('.filter-val');
            if (simpleInput) {
                const v = simpleInput.value.trim();
                if (!v) return null;
                return { column: col, operator: op, value: v, label: meta?.label || col };
            }
            return null;
        }

        // Update filter state from a row change
        function updateFilterFromRow(rowId) {
            const val = readFilterRowValue(rowId);
            const idx = activeFilters.findIndex(f => f.id === rowId);
            if (val) {
                const entry = { id: rowId, ...val };
                if (idx >= 0) activeFilters[idx] = entry;
                else activeFilters.push(entry);
            } else if (idx >= 0) {
                activeFilters.splice(idx, 1);
            }
            renderFilterChips();
        }

        // Remove a filter row
        function removeFilterRow(rowId) {
            const row = document.getElementById(`filter-row-${rowId}`);
            if (row) {
                row.style.animation = 'filterRowIn .2s ease reverse';
                setTimeout(() => row.remove(), 200);
            }
            activeFilters = activeFilters.filter(f => f.id !== rowId);
            renderFilterChips();
            if (document.getElementById('filterRows').children.length <= 1) {
                setTimeout(() => {
                    if (document.getElementById('filterRows').children.length === 0)
                        document.getElementById('clearFiltersBtn').style.display = 'none';
                }, 250);
            }
        }

        // Clear all filters
        function clearAllFilters() {
            if (confirm('Are you sure you want to clear all filters?')) {
                activeFilters = [];
                document.getElementById('filterRows').innerHTML = '';
                renderFilterChips();
                document.getElementById('clearFiltersBtn').style.display = 'none';
                document.getElementById('manualFilters').value = '';
                document.getElementById('offset').value = 0; // Reset pagination
                showToast('All filters cleared', 'success');
            }
        }

        // Render filter chips
        function renderFilterChips() {
            const container = document.getElementById('filterChips');
            if (activeFilters.length === 0) {
                container.innerHTML = '';
                return;
            }
            const logic = document.getElementById('filterLogic').value;
            let html = '';
            activeFilters.forEach((f, i) => {
                let displayVal;
                if (f.operator === 'BETWEEN') displayVal = `${f.value[0]} – ${f.value[1]}`;
                else if (Array.isArray(f.value)) displayVal = f.value.join(', ');
                else displayVal = f.value;
                if (i > 0) html += `<span style="color:rgba(255,255,255,0.35);font-size:0.75rem;align-self:center;">${logic}</span>`;
                html += `<div class="filter-chip">
                    <span>${f.label} ${f.operator} ${displayVal}</span>
                    <button class="chip-remove" onclick="removeFilterRow(${f.id})"><i class="fas fa-times"></i></button>
                </div>`;
            });
            container.innerHTML = html;
        }

        // ── Validation Layer ──
        function validate_filters(filters) {
            const valid = [];
            const mappedValues = {};

            filters.forEach(f => {
                // ✔ Non-empty values validation
                if (f.value === null || f.value === undefined) return;
                if (typeof f.value === 'string' && f.value.trim() === '') return;
                if (Array.isArray(f.value) && f.value.length === 0) return;

                const meta = getColumnMeta(f.column);
                const isNum = meta && meta.filter_type === 'numeric';
                const isCat = meta && meta.filter_type === 'categorical';

                let entry = { ...f };

                // ✔ Correct data type validation
                if (isNum) {
                    if (Array.isArray(entry.value)) {
                        entry.value = entry.value.map(v => Number(v));
                    } else {
                        entry.value = Number(entry.value);
                        if (isNaN(entry.value)) {
                            console.warn(`[Validation] Dropping filter: invalid numeric value for column ${entry.column}`);
                            return;
                        }
                    }
                }

                // ✔ Valid category values
                // The UI passes back the selected category.value directly.
                // We ensure it maps cleanly here.
                
                // Convert IN with 1 element to =
                if (entry.operator === 'IN' && Array.isArray(entry.value) && entry.value.length === 1) {
                    entry.operator = '=';
                    entry.value = entry.value[0];
                }

                valid.push(entry);
                mappedValues[entry.column] = entry.value;
            });

            console.log("Final Filter JSON:", JSON.stringify(valid, null, 2));
            console.log("Mapped Values:", JSON.stringify(mappedValues, null, 2));

            return valid;
        }

        // Build filter string for the existing backend (compatible format)
        function buildFilterString() {
            // ── Manual mode: validate and return raw text ──
            if (filterMode === 'manual') {
                const raw = document.getElementById('manualFilters').value;
                const result = validateManualFilter(raw);
                const errDiv = document.getElementById('manualFilterError');
                if (!result.valid) {
                    errDiv.textContent = result.error;
                    errDiv.style.display = 'block';
                    return '__BLOCKED__'; // sentinel; runQuery checks this
                }
                errDiv.style.display = 'none';
                console.log("Final SQL Query:", result.sanitized);
                return result.sanitized;
            }

            // ── Smart mode ──
            if (activeFilters.length === 0) return '';
            const logic = document.getElementById('filterLogic').value;

            // Apply Validation Layer
            const validFilters = validate_filters(activeFilters);

            const parts = validFilters.map(f => {
                const col = f.column;
                const meta = getColumnMeta(col);
                const isNum = meta && meta.filter_type === 'numeric';
                const isCat = meta && meta.filter_type === 'categorical';

                if (f.operator === 'BETWEEN' && Array.isArray(f.value)) {
                    return `${col} >= ${f.value[0]} AND ${col} <= ${f.value[1]}`;
                }

                if (f.operator === 'IN' && Array.isArray(f.value)) {
                    const vals = f.value.map(v => isNum ? v : `'${v}'`).join(',');
                    return `${col} IN (${vals})`;
                }

                if (f.operator === 'LIKE') {
                    return `LOWER(CAST(${col} AS TEXT)) LIKE LOWER('%${f.value}%')`;
                }

                // Case-insensitive text equality
                if (!isCat && !isNum && (f.operator === '=' || f.operator === '!=')) {
                    return `LOWER(CAST(${col} AS TEXT)) ${f.operator} LOWER('${f.value}')`;
                }

                const quotedVal = isNum ? f.value : `'${f.value}'`;
                return `${col} ${f.operator} ${quotedVal}`;
            });

            if (parts.length === 0) return '';
            const filterStr = parts.join(` ${logic} `);
            console.log('Final SQL Query:', filterStr);
            return filterStr;
        }

        async function loadColumns(survey, dataset, tableName) {
            showLoading(true);

            try {
                // Fetch columns + filter metadata in parallel
                const [colRes, metaRes] = await Promise.all([
                    fetch(`/surveys/${survey}/${encodeURIComponent(dataset)}/${tableName}/columns`),
                    loadFilterMetadata(survey, dataset, tableName)
                ]);
                const columns = await colRes.json();

                const grid = document.getElementById('columns-grid');
                grid.innerHTML = "";

                (Array.isArray(columns) ? columns : []).forEach((col, index) => {
                    const columnItem = document.createElement("div");
                    columnItem.className = "column-item";
                    columnItem.style.animationDelay = `${index * 50}ms`;

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.name = "columns";
                    checkbox.value = col;
                    checkbox.checked = true;
                    checkbox.id = `col-${col}`;

                    const label = document.createElement("label");
                    label.htmlFor = `col-${col}`;
                    // Show DDI label if available
                    const meta = getColumnMeta(col);
                    label.textContent = (meta && meta.label !== col) ? `${meta.label} (${col})` : col;

                    columnItem.appendChild(checkbox);
                    columnItem.appendChild(label);
                    grid.appendChild(columnItem);
                });

                updateAxisOptions(Array.isArray(columns) ? columns : []);
                showToast(`Loaded ${Array.isArray(columns) ? columns.length : 0} columns successfully!`, 'success');

            } catch (error) {
                console.error("Error loading columns:", error);
                showToast('Failed to load columns', 'error');

                showLoading(false);

        function getQueryContext() {
            const survey = document.getElementById('survey').value;
            const dataset = document.getElementById('dataset').value;
            const table = document.getElementById('table').value;
            const columns = getSelectedColumns().join(',');
            const filters = buildFilterString();
            const limit = document.getElementById('limit').value;
            const offset = document.getElementById('offset').value;

            if (filters === '__BLOCKED__') return { blocked: true };
            if (!survey || !dataset || !table) return { error: "Please select survey, dataset, and table." };

            const params = new URLSearchParams();
            if (columns) params.append("columns", columns);
            if (filters) params.append("filters", filters);
            if (limit) params.append("limit", limit);
            if (offset) params.append("offset", offset);

            const queryString = params.toString();
            const endpoint = `/surveys/${survey}/${encodeURIComponent(dataset)}/${table}/query?${queryString}`;
            const cacheKey = `${survey}|${dataset}|${table}|${queryString}`;
            return { survey, dataset, table, queryString, endpoint, cacheKey };
        }

        // Run Query with Progress
        async function runQuery() {
            hasQueryRun = true;
            // Sync any un-committed filter rows before querying (smart mode)
            if (filterMode === 'smart') {
                document.querySelectorAll('.filter-row').forEach(row => {
                    const rowId = parseInt(row.dataset.rowId);
                    if (!isNaN(rowId)) updateFilterFromRow(rowId);
                });
            }

            const context = getQueryContext();

            // Block if manual filter validation failed
            if (context.blocked) {
                showToast('Filter contains blocked SQL keywords. Please fix.', 'error');
                return;
            }

            if (context.error) {
                showToast(context.error, 'error');
                return;
            }

            showLoading(true);
            showProgress(true, 0);

            try {
                showProgress(true, 30);
                const res = await fetch(context.endpoint);
                showProgress(true, 60);
                const data = await res.json();

                if (Array.isArray(data)) {
                    showProgress(true, 80);
                    latestResults = data;
                    chartNeedsRefresh = true;
                    chartDataRows = [];
                    chartRequestCache = { key: '', rows: [] };
                    if (currentChart) {
                        currentChart.destroy();
                        currentChart = null;
                    }
                    renderChartInfoState('fas fa-bolt', 'Chart ready to generate', 'Click Generate Chart to render visualization for current query.');
                    const hint = document.getElementById('chartStateHint');
                    if (hint) {
                        hint.textContent = 'Query data updated. Click Generate Chart.';
                    }
                    renderTable(data);
                    updatePaginationInfo(data.length);
                    showProgress(true, 100);
                    setTimeout(() => showProgress(false), 500);
                    showToast(`Query executed successfully! ${data.length} rows returned.`, 'success');
                } else if (data.error) {
                    showToast("Query error: " + data.error, 'error');
                } else {
                    showToast("Unexpected response format.", 'error');
                }
            } catch (error) {
                console.error("Query error:", error);
                showToast("Failed to execute query.", 'error');
            } finally {
                showLoading(false);
                showProgress(false);
            }
        }

        async function generateChart() {
            if (isGeneratingChart) return;

            const chartType = document.getElementById('chartType').value;
            const xAxisCol = document.getElementById('xAxis').value;
            const yAxisCol = document.getElementById('yAxis').value;

            if (!xAxisCol || !yAxisCol) {
                showToast('Please select both X and Y axis columns.', 'warning');
                renderChartInfoState('fas fa-exclamation-triangle', 'Select axes', 'Choose both X and Y axis before generating chart.');
                return;
            }

            const context = getQueryContext();
            if (context.blocked) {
                showToast('Filter contains blocked SQL keywords. Please fix.', 'error');
                return;
            }
            if (context.error) {
                showToast(context.error, 'error');
                return;
            }

            isGeneratingChart = true;
            setGenerateChartLoading(true);
            renderChartInfoState('fas fa-spinner fa-spin', 'Generating chart', 'Fetching chart data for selected query...');

            try {
                let rows = [];
                if (!chartNeedsRefresh && chartRequestCache.key === context.cacheKey && Array.isArray(chartRequestCache.rows)) {
                    rows = chartRequestCache.rows;
                } else {
                    const response = await fetch(context.endpoint);
                    if (!response.ok) {
                        throw new Error(`Chart request failed with status ${response.status}`);
                    }
                    const data = await response.json();
                    if (!Array.isArray(data)) {
                        throw new Error(data?.error || 'Unexpected chart response format.');
                    }
                    rows = data;
                    chartRequestCache = { key: context.cacheKey, rows };
                }

                chartDataRows = rows;
                chartNeedsRefresh = false;
                const hint = document.getElementById('chartStateHint');
                if (hint) {
                    hint.textContent = `Chart generated (${chartType.toUpperCase()})`;
                }
                updateChart(rows, true);
            } catch (error) {
                console.error('Chart generation error:', error);
                renderChartInfoState('fas fa-circle-exclamation', 'Chart failed', 'Unable to fetch chart data. Please retry.');
                showToast(`Failed to generate chart: ${error.message}`, 'error');
            } finally {
                isGeneratingChart = false;
                setGenerateChartLoading(false);
            }
        }

        // Render Table with Animation
        function renderTable(data) {
            const tableHead = document.getElementById('tableHead');

                const emptyHint = hasQueryRun
                    ? 'Try adjusting your filters, broadening the range, or removing some conditions.'
                    : 'Select survey, dataset, table, then click Execute Query.';

                </td></tr>`;
                document.getElementById('tablePagination').style.display = 'none';
