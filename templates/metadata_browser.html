<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Browser - statXtract</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2E5BBA;
            --primary-dark: #1F3A5F;
            --secondary: #64748b;
            --accent: #F4A300;
            --bg-page: #F8FAFC;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(209, 213, 219, 0.5);
            --text-main: #1C1C1C;
            --text-muted: #6B7280;
            --shadow-heavy: 0 10px 30px rgba(31, 58, 95, 0.07);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 16px;
        }

        [data-theme="dark"] {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --accent: #10b981;
            --bg-page: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: rgba(255, 255, 255, 0.95);
            --text-muted: rgba(255, 255, 255, 0.7);
            --shadow-heavy: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-page);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            transition: var(--transition);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .btn-back {
            display: inline-flex; alignment-items: center; gap: 8px;
            padding: 10px 20px; background: var(--glass-bg);
            border: 1px solid var(--glass-border); border-radius: 12px;
            color: var(--text-main); text-decoration: none;
            font-weight: 600; transition: var(--transition);
        }

        .btn-back:hover { background: var(--primary); color: #fff; transform: translateX(-5px); }

        .title { font-family: 'Poppins', sans-serif; font-size: 2rem; font-weight: 700; color: var(--primary); }

        .theme-toggle {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; background: var(--glass-bg);
            border: 1px solid var(--glass-border); border-radius: 12px;
            color: var(--text-main); cursor: pointer;
            font-weight: 600; transition: var(--transition);
        }

        .theme-toggle:hover { transform: translateY(-2px); background: var(--primary); color: #fff; }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 30px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-heavy);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(31, 58, 95, 0.12);
        }

        .card-icon { font-size: 2.5rem; color: var(--primary); opacity: 0.9; }
        .card-title { font-size: 1.25rem; font-weight: 700; color: var(--text-main); }
        .card-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .loading-spinner {
            text-align: center; padding: 60px; font-size: 1.2rem; color: var(--secondary);
        }
        .loading-spinner i { animation: spin 1s infinite linear; font-size: 2.5rem; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .breadcrumb {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 25px; font-size: 1rem; color: var(--text-muted);
        }
        .breadcrumb-item { cursor: pointer; transition: color 0.2s; }
        .breadcrumb-item:hover { color: var(--primary); }
        .breadcrumb-item.active { color: var(--text-main); font-weight: 700; cursor: default; }
        .separator { opacity: 0.5; }

    </style>
</head>
<body data-theme="light">
    <div class="container">
        <div class="header">
            <div class="header-left">
                <a href="/admin/dashboard" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <h1 class="title">Metadata Browser</h1>
            </div>
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
                <span>Dark Mode</span>
            </button>
        </div>

        <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item active" onclick="showLevel(1)">Surveys</span>
        </div>

        <!-- Level 1: Surveys -->
        <div id="view-surveys" class="view-section active">
            <div id="surveys-grid" class="cards-grid">
                <!-- Loaded via JS -->
            </div>
        </div>

        <!-- Level 2: Datasets -->
        <div id="view-datasets" class="view-section">
            <div id="datasets-grid" class="cards-grid">
                <!-- Loaded via JS -->
            </div>
        </div>

        <div id="loader" class="loading-spinner" style="display:none;">
            <i class="fas fa-circle-notch"></i>
            <div>Loading...</div>
        </div>
    </div>

    <script>
        let state = {
            level: 1,
            selectedSurvey: null,
            surveys: [],
            datasets: []
        };

        async function loadSurveys() {
            showLoader(true);
            try {
                const res = await fetch('/schemas');
                const data = await res.json();
                state.surveys = data;
                renderSurveys();
            } catch (e) {
                console.error(e);
            } finally {
                showLoader(false);
            }
        }

        function renderSurveys() {
            const grid = document.getElementById('surveys-grid');
            grid.innerHTML = '';
            state.surveys.forEach(s => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.onclick = () => loadDatasets(s);
                card.innerHTML = `
                    <i class="fas fa-folder-tree card-icon"></i>
                    <h3 class="card-title">${s.name || s.schema}</h3>
                    <p class="card-desc">Click to browse datasets and detailed metadata for this survey.</p>
                `;
                grid.appendChild(card);
            });
        }

        async function loadDatasets(survey) {
            state.selectedSurvey = survey;
            showLevel(2);
            showLoader(true);
            try {
                const res = await fetch(`/schemas/${survey.schema}/datasets`);
                const data = await res.json();
                state.datasets = data;
                renderDatasets();
            } catch (e) {
                console.error(e);
            } finally {
                showLoader(false);
            }
        }

        function renderDatasets() {
            const grid = document.getElementById('datasets-grid');
            grid.innerHTML = '';
            state.datasets.forEach(d => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.onclick = () => {
                    window.location.href = `/metadata-detail/${state.selectedSurvey.schema}/${d.dataset}`;
                };
                card.innerHTML = `
                    <i class="fas fa-database card-icon"></i>
                    <h3 class="card-title">${d.display_name || d.dataset}</h3>
                    <p class="card-desc">View full DDI metadata, study information, and download links.</p>
                    <div style="margin-top: auto; color: var(--primary); font-weight: 700; font-size: 0.9rem;">
                        View Metadata <i class="fas fa-arrow-right"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showLevel(n) {
            state.level = n;
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            const bc = document.getElementById('breadcrumb');
            
            if(n === 1) {
                document.getElementById('view-surveys').classList.add('active');
                bc.innerHTML = '<span class="breadcrumb-item active">Surveys</span>';
            } else {
                document.getElementById('view-datasets').classList.add('active');
                bc.innerHTML = `
                    <span class="breadcrumb-item" onclick="showLevel(1)">Surveys</span>
                    <span class="separator">/</span>
                    <span class="breadcrumb-item active">${state.selectedSurvey.name || state.selectedSurvey.schema}</span>
                `;
            }
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        // Theme Toggle Functionality
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            const toggle = document.getElementById('theme-toggle');
            if(!toggle) return;
            if(theme === 'dark') {
                toggle.innerHTML = '<i class="fas fa-sun"></i> <span>Light Mode</span>';
            } else {
                toggle.innerHTML = '<i class="fas fa-moon"></i> <span>Dark Mode</span>';
            }
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
            loadSurveys();
        };
    </script>
</body>
</html>
