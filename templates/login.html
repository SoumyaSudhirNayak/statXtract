<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Data Analytics Platform</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            /* Standard Theme Tokens */
            --primary-color: #2E5BBA;
            --primary-gradient: linear-gradient(135deg, #2E5BBA 0%, #1F3A5F 100%);
            --secondary-color: #F4A300;
            --secondary-gradient: linear-gradient(135deg, #F4A300 0%, #D97706 100%);
            --success-color: #2E7D32;
            --warning-color: #F4A300;
            --danger-color: #D4183D;
            --text-main: #1C1C1C;
            --text-muted: #6B7280;
            --bg-page: linear-gradient(135deg, #F5F7FA 0%, #EEF3FB 55%, #E9EEF7 100%);
            --surface-bg: rgba(255, 255, 255, 0.88);
            --surface-muted: #F8FAFC;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(209, 213, 219, 0.5);
            --shadow-light: 0 8px 32px rgba(31, 58, 95, 0.07);
            --shadow-heavy: 0 16px 40px rgba(31, 58, 95, 0.12);
            --border-radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --text-on-primary: #FFFFFF;
        }

        [data-theme="dark"] {
            --primary-color: #6366F1;
            --primary-gradient: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            --text-main: #F8FAFC;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg-page: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
            --surface-bg: rgba(15, 23, 42, 0.78);
            --surface-muted: rgba(30, 41, 59, 0.9);
            --glass-bg: rgba(15, 23, 42, 0.78);
            --glass-border: rgba(100, 116, 139, 0.25);
            --shadow-light: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text-main);
            transition: var(--transition);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Top Actions */
        .top-actions {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 15px;
        }

        .action-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            font-weight: 500;
            text-decoration: none;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        /* Main Container */
        .main-container {
            max-width: 450px;
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 40px 30px;
            color: var(--text-main);
            box-shadow: var(--shadow-light);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Glass Morphism Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-heavy);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-input {
            width: 100%;
            padding: 18px 24px;
            background: var(--surface-muted);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: var(--text-main);
            font-size: 1.1rem;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(46, 91, 186, 0.15);
            transform: translateY(-2px);
        }

        /* Advanced Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 32px;
            background: var(--primary-gradient);
            color: var(--text-on-primary);
            border: none;
            border-radius: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: var(--transition);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Register Link */
        .register-link {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }

        .register-link:hover {
            transform: translateY(-2px);
        }

        .register-link p {
            color: var(--text-muted);
            font-size: 1rem;
            margin: 0;
        }

        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .register-link a:hover {
            color: var(--secondary-color);
            text-shadow: 0 0 10px rgba(240, 147, 251, 0.5);
        }

        /* Additional Features */
        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .forgot-password a:hover {
            color: var(--secondary-color);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px 25px;
            color: var(--text-light);
            min-width: 300px;
            transform: translateY(-100px);
            opacity: 0;
            animation: slideDown 0.3s ease-out forwards;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .toast.success {
            border-left: 4px solid var(--success-color);
        }

        .toast.error {
            border-left: 4px solid var(--danger-color);
        }

        /* Animations */
        @keyframes slideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-container {
                max-width: 100%;
                padding: 0 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .glass-card {
                padding: 25px;
            }

            .btn {
                padding: 15px 25px;
                font-size: 1rem;
            }

            .toast {
                min-width: 250px;
                margin: 0 20px;
            }
        }

        /* Selection Highlight */
        ::selection {
            background: rgba(102, 126, 234, 0.3);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Welcome message for returning users */
        .welcome-message {
            background: rgba(46, 91, 186, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            color: var(--text-main);
            text-align: center;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
    
        
    </style>
</head>

<body>
    <!-- Top Actions -->
    <div class="top-actions">
        <a href="/module-selection" class="action-btn">
            <i class="fas fa-arrow-left"></i>
            <span>Back</span>
        </a>
        <div class="action-btn theme-toggle" onclick="toggleTheme()" style="position:static;">
            <i class="fas fa-moon"></i>
            <span id="themeToggleText">Dark Mode</span>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-sign-in-alt"></i> Login</h1>
            <p>Welcome back to the Data Analytics Platform</p>
        </div>

        <!-- Welcome Message (Optional) -->
        <div class="welcome-message">
            <i class="fas fa-info-circle"></i>
            <span>Sign in to access your analytics dashboard</span>
        </div>

        <!-- Login Form -->
        <div class="glass-card">
            <form action="/auth/login" method="post" id="loginForm">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="text" name="username" class="form-input" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>

                <div class="forgot-password">
                    <a href="#" onclick="showToast('Password reset feature coming soon!', 'info')">Forgot your password?</a>
                </div>
            </form>
        </div>

        <!-- Register Link -->
        <div class="register-link">
            <p>Don't have an account? <a href="/register">Create Account Here</a></p>
        </div>
    </div>

    <script>
        // Theme Toggle Functionality
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            const toggle = document.querySelector('#themeToggleText');
            const icon = document.querySelector('.theme-toggle i');
            if(!toggle) return;
            if(theme === 'dark') {
                toggle.textContent = 'Light Mode';
                icon.className = 'fas fa-sun';
            } else {
                toggle.textContent = 'Dark Mode';
                icon.className = 'fas fa-moon';
            }
        }

        // Initialize Theme
        (function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
        })();

        // Form validation and enhancement
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.querySelector('input[name="username"]').value;
            const password = document.querySelector('input[name="password"]').value;

            // Basic validation
            if (!username || !password) {
                e.preventDefault();
                showToast('Please fill in all fields.', 'error');
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(username)) {
                e.preventDefault();
                showToast('Please enter a valid email address.', 'error');
                return;
            }

            // Show loading state
            const submitBtn = document.querySelector('.btn');
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            submitBtn.disabled = true;
        });

        // Toast Notification Function
        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icon = type === 'success' ? 'fa-check-circle' :
                type === 'error' ? 'fa-exclamation-circle' :
                type === 'info' ? 'fa-info-circle' :
                    'fa-exclamation-triangle';

            toast.innerHTML = `
                <i class="fas ${icon}"></i>
                <span>${message}</span>
            `;

            toastContainer.appendChild(toast);

            // Remove toast after 4 seconds
            setTimeout(() => {
                toast.style.animation = 'slideDown 0.3s ease-out reverse';
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 300);
            }, 4000);
        }

        // Add input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateY(-2px)';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });

        // Add welcome animation
        window.addEventListener('load', function() {
            const welcomeMessage = document.querySelector('.welcome-message');
            setTimeout(() => {
                welcomeMessage.style.animation = 'slideDown 0.5s ease-out';
            }, 500);
        });
    </script>
</body>

</html>
