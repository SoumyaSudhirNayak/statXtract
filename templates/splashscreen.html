<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STATXTRACT</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1F3A5F;
      --royal: #2E5BBA;
      --green: #2E7D32;
      --saffron: #F4A300;
      --bg: #F5F7FA;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    .abg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 0%, rgba(31, 58, 95, 0.3) 100%);
    }
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      animation: fadeIn 0.8s ease-out forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: 120px;
      margin: 0 0 16px;
      color: var(--navy);
      letter-spacing: -0.05em;
      text-shadow: 0 10px 40px rgba(31, 58, 95, 0.2);
      animation: glow 3s ease-in-out infinite;
    }
    @media (max-width: 600px) { h1 { font-size: 64px; } }
    @keyframes glow {
      0%, 100% { text-shadow: 0 10px 40px rgba(31, 58, 95, 0.2); }
      50% { text-shadow: 0 10px 60px rgba(46, 91, 186, 0.4); }
    }
    p {
      color: #1C1C1C;
      font-size: 20px;
      margin: 0;
      opacity: 0;
      animation: fadeText 0.5s ease forwards 0.3s;
    }
    @keyframes fadeText { to { opacity: 1; } }
    .loader {
      margin: 32px auto 0;
      width: 192px;
      height: 4px;
      border-radius: 99px;
      background: linear-gradient(to right, var(--royal), var(--saffron), var(--green));
      transform-origin: left;
      transform: scaleX(0);
      animation: loadBar 2.5s ease-in-out forwards;
    }
    @keyframes loadBar { to { transform: scaleX(1); } }
  </style>
</head>
<body>
  <div class="abg"></div>
  <div class="content">
    <h1>STATXTRACT</h1>
    <p>Smart Data Access Platform</p>
    <div class="loader"></div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = '/module-selection';
    }, 2500);
  </script>
</body>
</html>
