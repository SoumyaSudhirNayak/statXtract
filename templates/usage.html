<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usage Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Standard Theme Tokens */
            --primary: #2E5BBA;
            --primary-gradient: linear-gradient(135deg, #2E5BBA 0%, #1F3A5F 100%);
            --secondary: #64748b;
            --accent: #F4A300;
            --text-main: #1C1C1C;
            --text-muted: #6B7280;
            --bg-page: linear-gradient(135deg, #F5F7FA 0%, #EEF3FB 55%, #E9EEF7 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(209, 213, 219, 0.5);
            --shadow-heavy: 0 12px 32px rgba(31, 58, 95, 0.1);
            --radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --primary: #6366F1;
            --text-main: #F8FAFC;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg-page: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
            --glass-bg: rgba(15, 23, 42, 0.78);
            --glass-border: rgba(100, 116, 139, 0.25);
            --shadow-heavy: 0 12px 32px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            min-height:100vh;
            color:var(--text-main);
            padding:22px;
            transition: var(--transition);
        }

        .wrap { max-width: 1400px; margin: 0 auto; padding-top: 60px; }

        .back {
            position: fixed; top:16px; left:16px;
            color: var(--text-main); text-decoration:none;
            background:var(--glass-bg); border:1px solid var(--glass-border);
            border-radius:999px; padding:10px 18px;
            transition: var(--transition);
        }
        .back:hover { background: var(--primary); color: #fff; transform: translateX(-5px); }

        .theme-toggle {
            position: fixed; top:16px; right:16px;
            color: var(--text-main); cursor: pointer;
            background:var(--glass-bg); border:1px solid var(--glass-border);
            border-radius:999px; padding:10px 18px;
            transition: var(--transition);
            display: flex; align-items: center; gap: 8px; font-weight: 500;
        }
        .theme-toggle:hover { background: var(--primary); color: #fff; transform: translateY(-2px); }

        .head { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius); padding:24px; margin-bottom:18px; box-shadow:var(--shadow-heavy); }
        .head h1 { font-size: 1.8rem; display:flex; gap:12px; align-items:center; color: var(--primary); }
        .head p { color: var(--text-muted); margin-top: 8px; }

        .stats { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-bottom:18px; }
        .card { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-heavy); }
        .num { color: var(--primary); font-size: 1.8rem; font-weight: 700; }
        .label { color: var(--text-muted); font-size:.9rem; margin-top:4px; font-weight: 500; }

        .grid { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:14px; }
        .full { grid-column: 1 / -1; }
        .title { display:flex; align-items:center; gap:10px; font-size:1.1rem; font-weight: 700; margin-bottom:12px; color: var(--text-main); }

        table { width:100%; border-collapse: collapse; background: var(--bg-page); border:1px solid var(--glass-border); border-radius:12px; overflow:hidden; }
        th, td { padding:12px; text-align:left; font-size:.85rem; border-bottom:1px solid var(--glass-border); color: var(--text-main); }
        th { background: rgba(46, 91, 186, 0.05); color: var(--primary); font-weight: 600; }
        tr:hover td { background: rgba(46, 91, 186, 0.02); }

        .bars { display:flex; gap:6px; align-items:flex-end; height:120px; margin-top: 12px; }
        .bars i { display:block; flex:1; border-radius:6px 6px 0 0; background: linear-gradient(180deg, var(--primary), var(--primary-dark)); opacity: 0.8; }
        .legend { display:flex; justify-content:space-between; color: var(--text-muted); font-size:.8rem; margin-top:10px; }
        @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <a class="back" href="/admin/dashboard"><i class="fas fa-arrow-left"></i> Dashboard</a>
    <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
        <span>Dark Mode</span>
    </div>
    <div class="wrap">
        <div class="head">
            <h1><i class="fas fa-chart-line"></i> Usage Logs</h1>
            <p>Query activity, downloads, and usage metrics</p>
        </div>
        <div class="stats">
            <div class="card"><div id="mQueries" class="num">0</div><div class="label">Total Queries</div></div>
            <div class="card"><div id="mUsers" class="num">0</div><div class="label">Active Users</div></div>
            <div class="card"><div id="mRows" class="num">0</div><div class="label">Rows Accessed</div></div>
        </div>
        <div class="grid">
            <div class="card full">
                <div class="title"><i class="fas fa-database"></i> Query Logs</div>
                <table>
                    <thead><tr><th>User</th><th>Dataset/Table</th><th>Filters</th><th>Rows Returned</th><th>Time</th></tr></thead>
                    <tbody id="queryRows"></tbody>
                </table>
            </div>
            <div class="card full">
                <div class="title"><i class="fas fa-download"></i> Download Logs</div>
                <table>
                    <thead><tr><th>File Name</th><th>User</th><th>Size</th><th>Time</th></tr></thead>
                    <tbody id="downloadRows"></tbody>
                </table>
            </div>
            <div class="card">
                <div class="title"><i class="fas fa-chart-area"></i> Queries Over Time</div>
                <div class="bars" id="qotBars"></div>
                <div class="legend" id="qotLegend"></div>
            </div>
            <div class="card">
                <div class="title"><i class="fas fa-users"></i> Top Users</div>
                <div class="bars" id="topBars"></div>
                <div class="legend" id="topLegend"></div>
            </div>
        </div>
    </div>
    <script>
        const fmt = (n) => Number(n || 0).toLocaleString();
        const dt = (v) => v ? new Date(v).toLocaleString() : "-";
        const bytes = (v) => {
            const n = Number(v || 0);
            if (n > 1024 * 1024 * 1024) return (n / (1024 * 1024 * 1024)).toFixed(2) + " GB";
            if (n > 1024 * 1024) return (n / (1024 * 1024)).toFixed(2) + " MB";
            if (n > 1024) return (n / 1024).toFixed(2) + " KB";
            return n + " B";
        };
        const row = (vals) => `<tr>${vals.map(v => `<td>${v}</td>`).join("")}</tr>`;
        async function loadUsage() {
            const res = await fetch("/admin/usage/logs", { credentials: "same-origin" });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
            const metrics = data.metrics || data;
            document.getElementById("mQueries").textContent = fmt(metrics.total_queries);
            document.getElementById("mUsers").textContent = fmt(metrics.active_users);
            document.getElementById("mRows").textContent = fmt(metrics.rows_accessed);
            const qRows = (data.query_logs || data.logs || []).slice(0, 15).map(x => row([x.user_email || "-", x.dataset_table || x.endpoint || "-", x.filters || "-", fmt(x.rows_returned), dt(x.time)])).join("");
            document.getElementById("queryRows").innerHTML = qRows || row(["-", "-", "-", "-", "-"]);
            const dRows = (data.download_logs || []).slice(0, 15).map(x => row([x.file_name || "-", x.user_email || "-", bytes(x.size_bytes), dt(x.time)])).join("");
            document.getElementById("downloadRows").innerHTML = dRows || row(["-", "-", "-", "-"]);
            const qSeries = data.charts?.queries_over_time || [];
            const topUsers = data.charts?.top_users || [];
            const qMax = Math.max(...qSeries.map(x => Number(x.count || 0)), 1);
            const tMax = Math.max(...topUsers.map(x => Number(x.count || 0)), 1);
            document.getElementById("qotBars").innerHTML = qSeries.slice(-8).map(x => `<i style="height:${Math.max(10, Math.round((Number(x.count || 0) / qMax) * 100))}%"></i>`).join("");
            document.getElementById("qotLegend").innerHTML = qSeries.slice(-2).map(x => `<span>${x.day}: ${fmt(x.count)}</span>`).join("") || "<span>No data</span>";
            document.getElementById("topBars").innerHTML = topUsers.slice(0, 8).map(x => `<i style="height:${Math.max(10, Math.round((Number(x.count || 0) / tMax) * 100))}%"></i>`).join("");
            document.getElementById("topLegend").innerHTML = topUsers.slice(0, 2).map(x => `<span>${x.user_email}: ${fmt(x.count)}</span>`).join("") || "<span>No data</span>";
        }
        loadUsage().catch(() => {
            document.getElementById("queryRows").innerHTML = row(["No data", "No data", "No data", "0", "-"]);
            document.getElementById("downloadRows").innerHTML = row(["No data", "No data", "0 B", "-"]);
            document.getElementById("qotLegend").innerHTML = "<span>No data</span>";
            document.getElementById("topLegend").innerHTML = "<span>No data</span>";
        });

        // Theme Toggle Functionality
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            const toggle = document.getElementById('theme-toggle');
            if(!toggle) return;
            if(theme === 'dark') {
                toggle.innerHTML = '<i class="fas fa-sun"></i> <span>Light Mode</span>';
            } else {
                toggle.innerHTML = '<i class="fas fa-moon"></i> <span>Dark Mode</span>';
            }
        }

        // Initialize Theme
        (function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
        })();
    </script>
</body>
</html>
